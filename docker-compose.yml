services:
  forge:
    build: .
    ports:
      - "8080:8080"
    environment:
      FORGE_API_TOKEN: forge-secret
      FORGE_DOCKER_SOCKET: unix:///var/run/docker.sock
      FORGE_KUBECONFIG: /root/.kube/config
      FORGE_S3_ENDPOINT: minio:9000
    volumes:
      - forge-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--log.level=warn"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    user: "0" # Run as root to fix permission issues with bundled plugins
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_LOG_LEVEL=error
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: forge-admin
      MINIO_ROOT_PASSWORD: forge-super-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  forge-data:
  grafana-data:
  minio-data:
